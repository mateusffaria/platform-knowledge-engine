services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pke
      POSTGRES_USER: pke
      POSTGRES_PASSWORD: pke
    ports:
      - "5432:5432"
    volumes:
      - pke-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pke -d pke"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - pke-ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama"]
    command: ["pull", "nomic-embed-text"]
    depends_on:
      ollama:
        condition: service_healthy

  pke:
    build: .
    profiles:
      - cli
    environment:
      DATABASE_URL: postgres://pke:pke@postgres:5432/pke
      LOG_LEVEL: info
      APP_ENV: ${APP_ENV:-development}
      GIT_SHA: ${GIT_SHA:-}
      DEPLOYMENT_REGION: ${DEPLOYMENT_REGION:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-professional-knowledge-engine}
      OTEL_SAMPLE_RATIO: ${OTEL_SAMPLE_RATIO:-1}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-http://langfuse:3000}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_CAPTURE_CONTENT: ${LANGFUSE_CAPTURE_CONTENT:-false}
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      LLM_PROVIDER: ollama
      LLM_MODEL: qwen3:8b
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  pke-migrate:
    build: .
    profiles:
      - cli
    entrypoint: ["node", "dist/shared/database/migrate.js"]
    environment:
      DATABASE_URL: postgres://pke:pke@postgres:5432/pke
      LOG_LEVEL: info
      APP_ENV: ${APP_ENV:-development}
      GIT_SHA: ${GIT_SHA:-}
      DEPLOYMENT_REGION: ${DEPLOYMENT_REGION:-}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-professional-knowledge-engine}
      OTEL_SAMPLE_RATIO: ${OTEL_SAMPLE_RATIO:-1}
    depends_on:
      postgres:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    profiles: [observability-lite, observability-full]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
    depends_on:
      victoriametrics:
        condition: service_started
      victoria-logs:
        condition: service_started

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.115.0
    profiles: [observability-lite, observability-full]
    command: ["-retentionPeriod=7d"]
    ports:
      - "8428:8428"
    volumes:
      - pke-victoriametrics-data:/victoria-metrics-data

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.22.2-victorialogs
    profiles: [observability-lite, observability-full]
    command: ["-retentionPeriod=7d"]
    ports:
      - "9428:9428"
    volumes:
      - pke-victoria-logs-data:/vlogs

  grafana:
    image: grafana/grafana:11.6.0
    profiles: [observability-lite, observability-full]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: pke
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - pke-grafana-data:/var/lib/grafana

  langfuse:
    image: langfuse/langfuse:3
    profiles: [observability-full]
    environment: &langfuse-environment
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: local-langfuse-secret
      SALT: local-langfuse-salt
      REDIS_HOST: langfuse-redis
      REDIS_AUTH: local-langfuse-redis-password
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: "pke_user"
      CLICKHOUSE_PASSWORD: "pke_pass"
      CLICKHOUSE_CLUSTER_ENABLED: false
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: pke-bucket # < This must match your MinIO bucket name
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadminpassword
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: true
    ports:
      - "3001:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_started
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    profiles: [observability-full]
    environment:
      <<: *langfuse-environment
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_started
      clickhouse:
        condition: service_healthy
      minio:
        condition: service_healthy

  langfuse-postgres:
    image: postgres:16
    profiles: [observability-full]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pke-langfuse-postgres-data:/var/lib/postgresql/data

  langfuse-redis:
    image: redis:7-alpine
    profiles: [observability-full]
    command: ["redis-server", "--requirepass", "local-langfuse-redis-password", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a local-langfuse-redis-password ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pke-langfuse-redis-data:/data

  clickhouse:
      image: clickhouse/clickhouse-server:latest
      container_name: clickhouse-server
      profiles: [observability-full]
      ports:
        - "8123:8123" # HTTP interface
        - "9000:9000" # Native client
      healthcheck:
        test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 10s
      environment:
        - CLICKHOUSE_DB=pke
        - CLICKHOUSE_USER=pke_user
        - CLICKHOUSE_PASSWORD=pke_pass
        - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      volumes:
        - clickhouse_data:/var/lib/clickhouse
        - clickhouse_logs:/var/log/clickhouse-server
      ulimits:
        nofile:
          soft: 262144
          hard: 262144
      restart: always

  minio:
      image: quay.io/minio/minio:latest
      container_name: minio_server
      ports:
        - "9002:9000" # S3 API Port
        - "9001:9001" # Web Console Port
      environment:
        MINIO_ROOT_USER: minioadmin
        MINIO_ROOT_PASSWORD: minioadminpassword # Must be at least 8 characters
      volumes:
        - minio_data:/data
      command: server --console-address ":9001" /data
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
        interval: 10s
        timeout: 5s
        retries: 3
        start_period: 5s

  minio-init:
    image: quay.io/minio/mc:latest
    depends_on:
      - minio
    restart: on-failure
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set localminio http://minio:9000 minioadmin minioadminpassword;
      /usr/bin/mc mb localminio/pke-bucket;
      exit 0;
      "

volumes:
  pke-postgres-data:
  pke-ollama-data:
  pke-victoriametrics-data:
  pke-victoria-logs-data:
  pke-grafana-data:
  pke-langfuse-postgres-data:
  pke-langfuse-redis-data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
