services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pke
      POSTGRES_USER: pke
      POSTGRES_PASSWORD: pke
    ports:
      - "5432:5432"
    volumes:
      - pke-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pke -d pke"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pke-postgres-data:
