services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pke
      POSTGRES_USER: pke
      POSTGRES_PASSWORD: pke
    ports:
      - "5432:5432"
    volumes:
      - pke-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pke -d pke"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - pke-ollama-data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama-pull:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["ollama"]
    command: ["pull", "nomic-embed-text"]
    depends_on:
      ollama:
        condition: service_healthy

  pke:
    build: .
    profiles:
      - cli
    environment:
      DATABASE_URL: postgres://pke:pke@postgres:5432/pke
      LOG_LEVEL: info
      OTEL_ENABLED: "false"
      LANGFUSE_ENABLED: "false"
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      LLM_PROVIDER: ollama
      LLM_MODEL: qwen3:8b
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully

  pke-migrate:
    build: .
    profiles:
      - cli
    entrypoint: ["node", "dist/shared/database/migrate.js"]
    environment:
      DATABASE_URL: postgres://pke:pke@postgres:5432/pke
      LOG_LEVEL: info
      OTEL_ENABLED: "false"
      LANGFUSE_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.121.0
    profiles: [observability-lite, observability-full]
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"
    depends_on:
      victoriametrics:
        condition: service_started
      victoria-logs:
        condition: service_started

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.115.0
    profiles: [observability-lite, observability-full]
    command: ["-retentionPeriod=7d"]
    ports:
      - "8428:8428"
    volumes:
      - pke-victoriametrics-data:/victoria-metrics-data

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.22.2-victorialogs
    profiles: [observability-lite, observability-full]
    command: ["-retentionPeriod=7d"]
    ports:
      - "9428:9428"
    volumes:
      - pke-victoria-logs-data:/vlogs

  grafana:
    image: grafana/grafana:11.6.0
    profiles: [observability-lite, observability-full]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: pke
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - pke-grafana-data:/var/lib/grafana

  langfuse:
    image: langfuse/langfuse:3
    profiles: [observability-full]
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3001
      NEXTAUTH_SECRET: local-langfuse-secret
      SALT: local-langfuse-salt
      REDIS_HOST: langfuse-redis
    ports:
      - "3001:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_started

  langfuse-postgres:
    image: postgres:16
    profiles: [observability-full]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pke-langfuse-postgres-data:/var/lib/postgresql/data

  langfuse-redis:
    image: redis:7-alpine
    profiles: [observability-full]
    volumes:
      - pke-langfuse-redis-data:/data

volumes:
  pke-postgres-data:
  pke-ollama-data:
  pke-victoriametrics-data:
  pke-victoria-logs-data:
  pke-grafana-data:
  pke-langfuse-postgres-data:
  pke-langfuse-redis-data:
